<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Deos Originals — Loading</title>
<style>
  @property --pct { syntax: '<integer>'; initial-value: 0; inherits: false; }
  :root { --ease: cubic-bezier(.22,1,.36,1); --navy:#022541; --gold:#E5AE2E; --ink:rgba(2,37,65,0.85); }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--gold);font-family:-apple-system,system-ui,sans-serif;overflow:hidden;color:var(--navy)}
  .stage{position:fixed;inset:0;overflow:hidden}
  .wrap{display:flex;align-items:center;justify-content:center;height:100%;width:100%;position:relative;animation:sceneExit 0.9s 4.6s var(--ease) forwards}
  @keyframes sceneExit{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-40px)}}
  .logo{width:min(62vw,560px);aspect-ratio:649/731;position:relative;z-index:1}

  .meta{position:fixed;left:0;right:0;bottom:54px;display:flex;flex-direction:column;align-items:center;gap:14px;z-index:3;pointer-events:none;animation:metaIn 0.8s 0.3s var(--ease) both, metaExit 0.7s 4.55s var(--ease) forwards}
  @keyframes metaIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes metaExit{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-16px)}}
  .progressInner{width:min(48vw,340px)}
  .progressHeader{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;font-size:10px;letter-spacing:0.3em;font-weight:600;text-transform:uppercase;color:var(--navy);opacity:0.72}
  .progressNum{--pct:0;letter-spacing:0.08em;font-variant-numeric:tabular-nums;animation:countUp 3.9s 0.4s cubic-bezier(.65,.05,.25,1) forwards;counter-reset:pct var(--pct)}
  .progressNum::after{content:counter(pct) "%"}
  @keyframes countUp{to{--pct:100}}
  .progressTrack{height:1px;width:100%;background:rgba(2,37,65,0.22);position:relative;overflow:hidden}
  .progressFill{height:100%;width:0;background:var(--navy);animation:progressGrow 3.9s 0.4s cubic-bezier(.65,.05,.25,1) forwards}
  @keyframes progressGrow{0%{width:0}100%{width:100%}}
  .brandRow{display:flex;align-items:center;gap:14px;font-size:9px;letter-spacing:0.42em;text-transform:uppercase;opacity:0.55;font-weight:600}
  .brandRow .dot{width:3px;height:3px;border-radius:50%;background:var(--navy);opacity:0.6}

  .wipePanel{position:fixed;left:0;right:0;bottom:0;height:100%;background:var(--navy);transform:translateY(100%);z-index:5;animation:wipeUp 1s 4.55s cubic-bezier(.76,0,.24,1) forwards}
  @keyframes wipeUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .wipeMark{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.8);color:var(--gold);font-size:11px;letter-spacing:0.42em;text-transform:uppercase;font-weight:600;opacity:0;z-index:6;animation:markIn 0.6s 5.2s var(--ease) forwards}
  @keyframes markIn{to{opacity:0.85;transform:translate(-50%,-50%) scale(1)}}

  .controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
  button{background:var(--navy);color:var(--gold);border:0;padding:8px 14px;border-radius:999px;font-size:12px;cursor:pointer;letter-spacing:.08em;font-weight:600}
  button:hover{background:#033a66}
</style></head>

    <style>
      /* Unified easing + structured rhythm (beats at 0.3s) */
      @keyframes bgFade   { from {opacity:0} to {opacity:1} }
      @keyframes spotIn   { 0% {opacity:0;transform:scale(1.25)} 100% {opacity:0.7;transform:scale(1)} }
      @keyframes slideInL { 0% {opacity:0;transform:translateX(-110px)} 100% {opacity:1;transform:translateX(0)} }
      @keyframes slideInR { 0% {opacity:0;transform:translateX(110px)}  100% {opacity:1;transform:translateX(0)} }
      @keyframes heroRise { 0% {opacity:0;transform:translateY(70px) scale(0.9)} 100% {opacity:1;transform:translateY(0) scale(1)} }
      @keyframes haloIn   { 0% {opacity:0;transform:scale(0.55)} 100% {opacity:0.5;transform:scale(1)} }
      @keyframes haloPulse { 0%,100% {opacity:0.42} 50% {opacity:0.72} }
      @keyframes wipeIn   { 0% {clip-path:inset(0 100% 0 0);opacity:0} 15% {opacity:1} 100% {clip-path:inset(0 0 0 0);opacity:1} }
      @keyframes idleFloat { 0%,100% {transform:translateY(0)} 50% {transform:translateY(-4px)} }

      /* Timing rhythm: 0.0 bg → 0.3 spot → 0.6 letters → 1.5 halo/statue → 2.5 ORIGINALS → 4.6 exit */
      .bg        { animation: bgFade 0.6s ease-out both; }
      .spot      { transform-origin: 50% 45%; animation: spotIn 1.4s 0.3s cubic-bezier(.22,1,.36,1) both; }
      .letter-d  { transform-origin: center; animation: slideInL 0.85s 0.6s cubic-bezier(.22,1,.36,1) both; }
      .letter-s  { transform-origin: center; animation: slideInR 0.85s 0.6s cubic-bezier(.22,1,.36,1) both; }
      .letter-e  { transform-origin: center; animation: slideInL 0.85s 0.75s cubic-bezier(.22,1,.36,1) both; }
      .letter-o  { transform-origin: center; animation: slideInR 0.85s 0.75s cubic-bezier(.22,1,.36,1) both; }
      .statue-halo { transform-origin: 50% 55%; mix-blend-mode: screen; animation: haloIn 1.2s 1.45s cubic-bezier(.22,1,.36,1) both, haloPulse 3.6s 2.7s ease-in-out infinite; }
      .statue    { transform-origin: 55% 75%; animation: heroRise 1.3s 1.55s cubic-bezier(.22,1,.36,1) both, idleFloat 4.2s 2.9s ease-in-out infinite; }
      .originals { animation: wipeIn 1s 2.55s cubic-bezier(.22,1,.36,1) both; }
    </style>
